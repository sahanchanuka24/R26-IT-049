name: auto_learn_ar
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  flutter_tts: ^4.2.5
  image: ^4.8.0
  google_mlkit_image_labeling: ^0.14.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  image_picker: ^1.2.1
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/autolearn_model.tflite
    - assets/models/action_model.tflite
    - assets/models/model_unquant.tflite
    - assets/models/labels.txt
    - assets/models/action_labels.json
    - assets/models/component_mapping.json
    - assets/models/step_mapping.json